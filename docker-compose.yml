services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    image: gamer-backend:latest
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL:-}
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_PUBLISHABLE_KEY: ${SUPABASE_PUBLISHABLE_KEY:-}
      AUTH_REDIRECT_ORIGIN: ${AUTH_REDIRECT_ORIGIN:-}
      FRONTEND_URL: ${FRONTEND_URL:-}
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
      args:
        VITE_API_URL: ${VITE_API_URL:-}
    image: gamer-frontend:latest
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    restart: unless-stopped
