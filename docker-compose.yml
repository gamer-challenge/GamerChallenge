services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: gamer-backend:latest
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_PUBLISHABLE_KEY: ${SUPABASE_PUBLISHABLE_KEY}
      AUTH_REDIRECT_ORIGIN: ${AUTH_REDIRECT_ORIGIN}
      FRONTEND_URL: ${FRONTEND_URL}
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: gamer-frontend:latest
    ports:
      - "5173:5173"
    environment:
      NODE_ENV: production
      VITE_API_URL: ${VITE_API_URL}
    restart: unless-stopped
