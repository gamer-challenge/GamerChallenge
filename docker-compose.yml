services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: gamer-backend:dev
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/usr/src/app
      - /usr/src/app/node_modules
    command: sh -c "bun install --ignore-scripts && bun run docker:dev"
    env_file:
      - ./backend/.env
    environment:
      - NODE_ENV=development
    restart: unless-stopped
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: gamer-frontend:dev
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/usr/src/app
      - /usr/src/app/node_modules
    command: sh -c "bun install --ignore-scripts && bun run dev -- --host 0.0.0.0"
    environment:
      - NODE_ENV=development
    restart: unless-stopped
