services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    image: gamer-backend:latest
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL:-}
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_PUBLISHABLE_KEY: ${SUPABASE_PUBLISHABLE_KEY:-}
      AUTH_REDIRECT_ORIGIN: ${AUTH_REDIRECT_ORIGIN:-}
      FRONTEND_URL: ${FRONTEND_URL:-}
      FRONTEND_URLS: ${FRONTEND_URLS:-}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "bun -e \"const r = await fetch('http://127.0.0.1:3000/'); process.exit(r.ok ? 0 : 1)\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
    image: gamer-frontend:latest
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    restart: unless-stopped
