services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    image: gamer-backend:dev
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/usr/src/app
      - backend_node_modules:/usr/src/app/node_modules
    command: sh -c "set -a; [ ! -f .env ] || . ./.env; set +a; bun install --ignore-scripts && bun run docker:dev"
    environment:
      NODE_ENV: development
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "bun -e \"const r = await fetch('http://127.0.0.1:3000/'); process.exit(r.ok ? 0 : 1)\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    image: gamer-frontend:dev
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/usr/src/app
      - frontend_node_modules:/usr/src/app/node_modules
    command: sh -c "bun install --ignore-scripts && bun run dev -- --host 0.0.0.0"
    environment:
      NODE_ENV: development
    restart: unless-stopped

volumes:
  backend_node_modules:
  frontend_node_modules:
